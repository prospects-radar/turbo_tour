name: Release Gem

on:
  release:
    types: [published]

env:
  CI_RUBY_VERSION: "3.3"

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.CI_RUBY_VERSION }}
          bundler: latest
          bundler-cache: true

      - name: Ensure release tag matches gem version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          GEM_VERSION="$(ruby -e 'require_relative "lib/turbo_tour/version"; print TurboTour::VERSION')"

          if [ "$RELEASE_TAG" != "$GEM_VERSION" ] && [ "$RELEASE_TAG" != "v$GEM_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match gem version $GEM_VERSION."
            exit 1
          fi

      - name: Run test suite
        run: bundle exec rake test

      - name: Build gem for publishing
        run: gem build turbo_tour.gemspec --output turbo_tour.gem

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_AUTH_TOKEN: ${{ secrets.RUBYGEMS_AUTH_TOKEN }}
        run: |
          mkdir -p "$HOME/.gem"
          chmod 0700 "$HOME/.gem"
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_AUTH_TOKEN" > "$HOME/.gem/credentials"
          chmod 0600 "$HOME/.gem/credentials"

      - name: Publish gem to RubyGems
        run: gem push turbo_tour.gem
