journeys:
  dashboard_intro:
    - name: create_project
      target: create-project
      title: "Create your first project"
      body: "Click here to create your **first project**."

    - name: dashboard_metrics
      target: dashboard-metrics
      title: "Track performance"
      # size: wide          # optional: small | medium | large | wide
      body: |
        This area shows your **analytics metrics**.

        You can track:
        - Page views
        - Conversion rates
        - User engagement

    - name: billing_settings
      target: billing-panel
      title: "Billing settings"
      body: "Manage your **billing** and payment methods here."
      action: click                          # perform this action before showing the step
      action_target: "[data-tab='billing']"  # CSS selector for the element to act on

  invite_team:
    - name: invite_button
      target: invite-button
      title: "Invite your team"
      body: |
        Bring *collaborators* into your workspace.

        Use the `invite` button to send an email invitation.

# Multi-language support:
#
# Place each language in its own subdirectory:
#
#   config/turbo_tours/en/welcome.yml
#   config/turbo_tours/es/welcome.yml
#   config/turbo_tours/fr/welcome.yml
#
# Each file uses plain strings for title and body:
#
#   # config/turbo_tours/en/welcome.yml
#   journeys:
#     welcome_tour:
#       - name: greeting
#         target: greeting-banner
#         title: "Welcome!"
#         body: "Let us show you around."
#
#   # config/turbo_tours/es/welcome.yml
#   journeys:
#     welcome_tour:
#       - name: greeting
#         target: greeting-banner
#         title: "¡Bienvenido!"
#         body: "Permítanos mostrarle el lugar."
